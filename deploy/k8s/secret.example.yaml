# Template for the Secret holding sensitive values.
#
# DO NOT APPLY THIS FILE DIRECTLY — the placeholder values are intentionally
# invalid. Use one of:
#
#   1. Create the secret imperatively from a real key:
#        kubectl create secret generic sql-agent-secrets \
#          --namespace sql-agent \
#          --from-literal=OPENAI_API_KEY='sk-REPLACE-ME' \
#          --from-literal=POSTGRES_PASSWORD='REPLACE-ME'
#
#   2. Use sealed-secrets / external-secrets / SOPS and commit encrypted YAML.
#
# The Deployment references this secret by name: `sql-agent-secrets`.

apiVersion: v1
kind: Secret
metadata:
  name: sql-agent-secrets
  namespace: sql-agent
  labels:
    app.kubernetes.io/name: sql-agent
type: Opaque
stringData:
  OPENAI_API_KEY: "REPLACE_ME_NOT_A_REAL_KEY"
  # Optional, only if Postgres profile is used:
  # POSTGRES_PASSWORD: "REPLACE_ME"
